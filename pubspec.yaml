name: kidguardian
description: "KidGuardian - Đồng Hành Số: Ứng dụng quản lý thời gian sử dụng mạng xã hội cho trẻ em"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.4
  
  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  
  # Dependency Injection
  get_it: ^8.0.2
  
  # Local Storage
  shared_preferences: ^2.3.4
  
  # Charts
  fl_chart: ^0.70.2
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  
  # External Apps
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
